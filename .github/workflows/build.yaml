name: Nix Build
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  check:
    name: Nix Build
    permissions:
      id-token: write # Needed by magic-nix-cache-action
      contents: read # Read contents
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - uses: cachix/install-nix-action@a49548c11d9846ad46ecc0115273879b045f001c # v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable
      - uses: DeterminateSystems/magic-nix-cache-action@908b263ff629f4cc17666315b7fd3ec127c6244d # v14
        with:
          diagnostic-endpoint: ""
      - name: Nix Darwin Build
        if: matrix.os == 'macos-latest'
        run: |
            for host in $(nix eval --json .#darwinConfigurations --apply builtins.attrNames | jq -r '.[]'); do
                nix build ".#darwinConfigurations.$host.config.system.build.toplevel" --no-link
            done
      - name: Nix Linux Build
        if: matrix.os == 'ubuntu-latest'
        run: |
            for host in $(nix eval --json .#nixosConfigurations --apply builtins.attrNames | jq -r '.[]'); do
                nix build ".#nixosConfigurations.$host.config.system.build.toplevel" --no-link
            done
